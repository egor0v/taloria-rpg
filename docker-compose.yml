services:
  app:
    build: .
    env_file: .env.production
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uploads-data:/app/uploads
      - /opt/taloria/img:/app/img:ro
    depends_on:
      - mongo
    restart: always
    networks:
      - taloria-net

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: always
    networks:
      - taloria-net

volumes:
  mongo-data:
  uploads-data:

networks:
  taloria-net:
    driver: bridge
